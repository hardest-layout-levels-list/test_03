<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GD List</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Topbar */
.topbar {
    background: red;
    display: flex;
    padding: 0;
}

/* Buttons */
.dropdown {
    position: relative;
}

.dropbtn {
    background: red;
    color: white;
    border: none;
    padding: 15px 20px;
    font-size: 16px;
    cursor: pointer;
}

.dropbtn:hover {
    background: darkred;
}

/* Dropdown menu */
.dropdown-content {
    display: none;
    position: absolute;
    background: white;
    min-width: 160px;
    box-shadow: 0px 5px 10px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
}

.dropdown-content a:hover {
    background: #eee;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* Right side links */
.right-links {
    margin-left: auto;
    display: flex;
}

.right-links a {
    color: white;
    padding: 15px 20px;
    text-decoration: none;
}

.right-links a:hover {
    background: darkred;
}
</style>
</head>

<body>

<div class="topbar">

    <div class="dropdown">
        <button class="dropbtn">Lists</button>
        <div class="dropdown-content">
            <a href="#">Main List</a>
            <a href="#">Extended List</a>
            <a href="#">Legacy List</a>
        </div>
    </div>

    <div class="dropdown">
        <button class="dropbtn">Player Section</button>
        <div class="dropdown-content">
            <a href="#">Leaderboard</a>
            <a href="#">Player Stats</a>
        </div>
    </div>

    <div class="right-links">
        <a href="https://forms.google.com" target="_blank">Submit Record</a>
        <a href="https://discord.com" target="_blank">Discord</a>
    </div>

</div>

</body>
</html>
